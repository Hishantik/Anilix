version: 2

project_name: anilix

before:
  hooks:
    - go mod tidy

builds:
  - binary: anilix

    env:
      - CGO_ENABLED=1

    goos:
      - linux
      - darwin
      - windows
      - android

    goarch:
      - amd64
      - arm64

    ignore:
      - goos: windows
        goarch: arm64
      - goos: android
        goarch: amd64

archives:
  - formats:
      - tar.gz

    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-dev"

changelog:
  sort: asc
